<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Manager</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <script src="./contact.js"></script>
</head>

<body class="bg-primary">

<div class="container mt-5">
  <h2 class="text-center mb-4">📞 Contact Manager</h2>
  <div class="card p-4 mb-4">
    <div class="row g-3">
      <div class="col-md-3">
        <input type="number" id="id" class="form-control" placeholder="ID">
      </div>
      <div class="col-md-3">
        <input type="text" id="name" class="form-control" placeholder="Name">
      </div>
      <div class="col-md-3">
        <input type="email" id="email" class="form-control" placeholder="Email">
      </div>
      <div class="col-md-3">
        <input type="text" id="phone" class="form-control" placeholder="Phone">
      </div>
    </div>

    <div class="mt-3 text-center">
      <button class="btn btn-success me-2" onclick="addContact()">Add</button>
      <button class="btn btn-warning me-2" onclick="updateContact()">Update</button>
      <button class="btn btn-danger" onclick="deleteContact()">Delete</button>
    </div>
  </div>
  <div class="card p-3">
    <h5>Contact List</h5>
    <table class="table table-bordered mt-2">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
        </tr>
      </thead>
      <tbody id="contactTable"></tbody>
    </table>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
