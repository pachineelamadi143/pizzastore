<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monthly Activity</title>
    <link rel="icon" href="./Images/SpringLogo.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js"></script>
  </head>
  <body>
    <header>
      <div class="container">
        <nav class="navbar navbar-expand-md navbar-light" style="padding: 20px">
          <a
            class="navbar-brand d-flex align-items-center gap-2"
            href="index.html"
          >
            <img src="./Images/SpringLogo.png" height="50" />
            <span>SPRING FLOWER SCHOOL</span>
          </a>
          <button
            class="navbar-toggler"
            data-bs-toggle="collapse"
            data-bs-target="#mainMenu"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="mainMenu">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link active" href="welcome.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="activity.html">Monthly Chart</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="timetable.html">Time Table</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="profile.html">Profile</a>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </header>
    <main class="container my-4">
      <h3 class="mb-3" style="font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;">Monthly Activities</h3>

      <div class="mb-3">
        <label class="form-label" style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">Select Subject</label>
        <select class="form-select" id="subjectSelect">
          <option value="">-- Select Subject --</option>
          <option value="Maths">Maths</option>
          <option value="Science">Science</option>
          <option value="English">English</option>
        </select>
      </div>
      <ul class="list-group" id="activityList"></ul>
    </main>
    <script>
  const monthlyActivities = [
    {
      id: 1,
      activity: "Create project file which contains tables between 12 to 19",
      subject: "Maths"
    },
    {
      id: 2,
      activity: "Solve 20 problems on fractions",
      subject: "Maths"
    },
    {
      id: 3,
      activity: "Prepare chart on Solar System",
      subject: "Science"
    },
    {
      id: 4,
      activity: "Write notes on Human Digestive System",
      subject: "Science"
    },
    {
      id: 5,
      activity: "Write an essay on My Best Friend",
      subject: "English"
    }
  ];

  const subjectSelect = document.getElementById("subjectSelect");
  const activityList = document.getElementById("activityList");
  subjectSelect.addEventListener("change", function () {
    const selectedSubject = this.value;
    activityList.innerHTML = "";

    const filteredActivities = monthlyActivities.filter(
      act => act.subject === selectedSubject
    );
    if (filteredActivities.length === 0) {
      activityList.innerHTML = `<li class="list-group-item">No activities found</li>`;
      return;
    }
    filteredActivities.forEach(act => {
      const li = document.createElement("li");
      li.className = "list-group-item";
      li.textContent = act.activity;
      activityList.appendChild(li);
    });
  });
</script>

  </body>
</html>
