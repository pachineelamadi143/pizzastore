<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to SFS</title>
  <link rel="icon" href="./Images/SpringLogo.png" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <script src="./script.js"></script>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <div class="container mt-5">
    <p class="display-3 text-center">Welcome to Spring Flower School !</p>
    <div class="row justify-content-center">
      <div class="col-md-4">

        <div class="card p-4">
          <div class="d-flex justify-content-around mb-3">
            <button class="btn btn-primary" onclick="showLogin()">Login</button>
            <button class="btn btn-secondary" onclick="showRegister()">Register</button>
          </div>
          <div id="loginForm">
            <h4 class="text-center mb-3">Login</h4>
            <input type="text" id="loginUser" class="form-control mb-3" placeholder="Username"/>

            <input
              type="password"
              id="loginPass"
              class="form-control mb-3"
              placeholder="Password"
            />

            <button class="btn btn-success w-100" onclick="login()">
              Login
            </button>
          </div>
          <div id="registerForm" style="display:none;">
            <h4 class="text-center mb-3">Register</h4>
            <input
              type="text"
              id="regUser"
              class="form-control mb-3"
              placeholder="Username"
            />
            <input
              type="password"
              id="regPass"
              class="form-control mb-3"
              placeholder="Password"
            />
            <input
              type="email"
              class="form-control mb-3"
              placeholder="Email"
            />
            <button class="btn btn-warning w-100" onclick="register()">
              Register
            </button>
          </div>

        </div>

      </div>
    </div>
  </div>

</body>
</html>
